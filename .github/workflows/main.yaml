name: Build
on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build:json

      - name: Setup git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit built files
        run: |
          git add blocks/ scripts/ styles/ chunks/ component-models.json component-definition.json component-filters.json
          if git diff --staged --quiet; then
            echo "No changes to built files"
          else
            git commit -m "chore: rebuild from CI"
            git push
          fi
